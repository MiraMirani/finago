services:
  postgres:
    image: postgres:16
    container_name: finago-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: finago
      POSTGRES_USER: finago
      POSTGRES_PASSWORD: finago
    ports:
      - "5432:5432"
    volumes:
      - finago_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U finago -d finago"]
      interval: 5s
      timeout: 5s
      retries: 20

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: finago-backend
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: development
      PORT: 4000
      CORS_ORIGIN: http://localhost:5173
      DATABASE_URL: postgresql://finago:finago@postgres:5432/finago
    command: >
      sh -c "npm run db:migrate &&
      npm run db:seed &&
      npm run dev"
    ports:
      - "4001:4000"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: finago-frontend
    depends_on:
      backend:
        condition: service_started
    environment:
      VITE_API_BASE_URL: http://localhost:4001/api/v1
    command: npm run dev -- --host 0.0.0.0 --port 5173
    ports:
      - "5173:5173"
    restart: unless-stopped

volumes:
  finago_pgdata:
